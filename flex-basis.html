<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Basis</title>

    <style>
        *{
   margin: 0px;
   padding: 0px;
   box-sizing: border-box;
}

body{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    font-size: 25px;
    width: 100%;
    min-height: 100vh;
}

.container{
    border: 2px solid red;
    width: 100%;
    height: 100vh;
    display: flex;
    gap:2rem;
    flex-wrap: wrap;
    flex-direction: row; /*y-axis*/
}

[class ^="box-"]{
    width: 100px;
    height: 100px;
    background-color: skyblue;
    border-radius: 10px;
}

.box-1{
    flex-basis: 100px;
}

.box-2{
    flex-grow: 2;
}

.box-3{
    flex-grow: 1;
}

.box-4{
    flex-grow: 3;
}

    </style>

</head>
<body>
    <div class="container">
        <div class="box-1">A</div>
        <div class="box-2">B</div>
        <div class="box-3">C</div>
        <div class="box-4">D</div>
    </div>
</body>
</html>
